apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: demo
  labels:
    app: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo- backend-container
        image: laxmireddy870113/backend:v1
        ports:
        - containerPort: 5000


---

apiVersion: v1
kind: Service
metadata:
  name: demo- backend-service
  namespace: demo  
spec:
  selector:
    app: demo
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP

