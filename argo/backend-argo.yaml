apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-backend-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cloud-Lucky/demo-backend-config.git
    targetRevision: HEAD
    path: backend
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
     prune: true
     selfHeal: true
    syncOptions:
     - CreateNamespace=true
     - PruneLast=true
     - ApplyOutOfSyncOnly=true   
       
